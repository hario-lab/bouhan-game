<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>問題管理 — 防犯マス取りゲーム</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; background: #f0f9ff; min-height: 100vh; }
header { background: #0c4a6e; color: white; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
header h1 { font-size: 18px; }
header a { color: #7dd3fc; font-size: 13px; text-decoration: none; }
.tabs { display: flex; background: #0369a1; }
.tab { flex: 1; padding: 12px; text-align: center; color: #bae6fd; font-weight: bold; cursor: pointer; font-size: 15px; border: none; background: none; }
.tab.active { background: #f0f9ff; color: #0c4a6e; }
.container { max-width: 700px; margin: 0 auto; padding: 20px; }
.toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.btn { padding: 9px 16px; border-radius: 10px; border: none; font-size: 14px; font-weight: bold; cursor: pointer; }
.btn-primary { background: #0ea5e9; color: white; }
.btn-success { background: #16a34a; color: white; }
.btn-warning { background: #d97706; color: white; }
.btn-danger { background: #dc2626; color: white; }
.btn-gray { background: #94a3b8; color: white; }
.btn:hover { opacity: .85; }
.qCount { font-size: 13px; color: #64748b; margin-left: auto; }

.qCard { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 14px 16px; margin-bottom: 10px; }
.qCard-head { display: flex; align-items: flex-start; gap: 10px; }
.qNum { font-size: 12px; color: #94a3b8; min-width: 28px; padding-top: 2px; }
.qCardText { flex: 1; font-size: 14px; color: #1e293b; line-height: 1.5; }
.qCardActions { display: flex; gap: 6px; margin-top: 10px; justify-content: flex-end; }
.badge-multi { display: inline-block; background: #f59e0b; color: white; font-size: 11px; padding: 2px 7px; border-radius: 8px; margin-left: 6px; }

/* modal */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
.modal-bg.show { display: flex; }
.modal { background: white; border-radius: 16px; padding: 24px; max-width: 540px; width: 100%; max-height: 90vh; overflow-y: auto; }
.modal h2 { font-size: 17px; margin-bottom: 16px; color: #0c4a6e; }
label { display: block; font-size: 13px; color: #64748b; margin-bottom: 4px; margin-top: 12px; }
textarea, input[type=text] { width: 100%; padding: 10px; border-radius: 8px; border: 1.5px solid #cbd5e1; font-size: 14px; font-family: inherit; }
textarea { resize: vertical; min-height: 70px; }
.choiceRow { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.choiceRow input[type=text] { flex: 1; }
.choiceRow input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; flex-shrink: 0; }
.choiceRow .removeChoiceBtn { background: #fee2e2; color: #dc2626; border: none; border-radius: 6px; padding: 4px 8px; cursor: pointer; font-size: 12px; }
.addChoiceBtn { background: #e0f2fe; color: #0369a1; border: none; border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; margin-top: 4px; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
.hint { font-size: 12px; color: #94a3b8; margin-top: 4px; }

/* import section */
.importBox { background: #f8fafc; border: 2px dashed #cbd5e1; border-radius: 12px; padding: 16px; margin-top: 8px; }
.importBox input[type=file] { display: block; margin-top: 8px; }
footer { text-align: center; font-size: 12px; color: #94a3b8; padding: 20px; }
</style>
</head>
<body>
<header>
  <h1>問題管理 — 防犯マス取りゲーム ver.1.2.0</h1>
  <a href="index.html">← ゲームに戻る</a>
</header>
<div class="tabs">
  <button class="tab active" onclick="switchLevel('レベル１',this)">レベル１</button>
  <button class="tab" onclick="switchLevel('レベル２',this)">レベル２</button>
  <button class="tab" onclick="switchLevel('レベル３',this)">レベル３</button>
</div>
<div class="container">
  <div class="toolbar">
    <button class="btn btn-primary" onclick="openAddModal()">＋ 問題を追加</button>
    <button class="btn btn-success" onclick="exportQuestions()">⬇ エクスポート</button>
    <button class="btn btn-warning" onclick="document.getElementById('importFile').click()">⬆ インポート</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importQuestions(event)">
    <button class="btn btn-gray" onclick="resetToDefault()">デフォルトに戻す</button>
    <span class="qCount" id="qCount"></span>
  </div>
  <div class="importBox">
    <b style="font-size:13px;color:#0369a1;">問題の共有方法（マシン間の移行）</b>
    <p style="font-size:12px;color:#64748b;margin-top:4px;">「エクスポート」で問題をJSONファイルとして保存 → USBやメールで別のマシンに渡す → 別のマシンで「インポート」するとlocalStorageに反映されます。</p>
  </div>
  <div id="qList" style="margin-top:16px;"></div>
  <button class="btn btn-gray" style="margin-top:8px;font-size:12px;" onclick="resetToDefault()">⚠ このレベルの問題をデフォルトに戻す</button>
</div>

<!-- Add/Edit Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle">問題を追加</h2>
    <label>問題文</label>
    <textarea id="fQuestion" rows="3" placeholder="問題文を入力..."></textarea>
    <label style="margin-top:14px;">選択肢（チェックを入れたものが正解）</label>
    <p class="hint">※ 正解を複数にすると「全て選択したら正解」になります</p>
    <div id="choicesContainer"></div>
    <button class="addChoiceBtn" onclick="addChoiceRow()">＋ 選択肢を追加</button>
    <div class="modal-actions">
      <button class="btn btn-gray" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveQuestion()">保存</button>
    </div>
  </div>
</div>

<footer>hariolab.com（摂南大学針尾研究室）</footer>

<script src="questions_low.js"></script>
<script>var DEFAULT_LOW = QUESTIONS.slice(); var GRADE_LOW = GRADE_NAME;</script>
<script src="questions_mid.js"></script>
<script>var DEFAULT_MID = QUESTIONS.slice(); var GRADE_MID = GRADE_NAME;</script>
<script src="questions_high.js"></script>
<script>var DEFAULT_HIGH = QUESTIONS.slice(); var GRADE_HIGH = GRADE_NAME;</script>

<script>
var currentLevel = 'レベル１';
var editIndex = -1;

function getDefaultQuestions(level) {
  if (level === 'レベル１') return DEFAULT_LOW;
  if (level === 'レベル２') return DEFAULT_MID;
  return DEFAULT_HIGH;
}

function getQuestions(level) {
  var stored = localStorage.getItem('bouhan_q_' + level);
  if (stored) { try { return JSON.parse(stored); } catch(e) {} }
  return getDefaultQuestions(level).slice();
}

function saveQuestions(level, qs) {
  localStorage.setItem('bouhan_q_' + level, JSON.stringify(qs));
}

function switchLevel(level, el) {
  currentLevel = level;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  renderList();
}

function renderList() {
  var qs = getQuestions(currentLevel);
  var el = document.getElementById('qList');
  document.getElementById('qCount').textContent = '全 ' + qs.length + ' 問';
  if (qs.length === 0) { el.innerHTML = '<p style="color:#94a3b8;text-align:center;padding:20px;">問題がありません</p>'; return; }
  var html = '';
  qs.forEach(function(q, i) {
    var multiCount = q.choices.filter(function(c){ return c.c; }).length;
    var multiBadge = multiCount > 1 ? '<span class="badge-multi">複数正解（'+multiCount+'つ）</span>' : '';
    html += '<div class="qCard">';
    html += '<div class="qCard-head"><span class="qNum">Q'+(i+1)+'</span><span class="qCardText">'+escHtml(q.q)+multiBadge+'</span></div>';
    html += '<div class="qCardActions">';
    html += '<button class="btn btn-primary" style="font-size:12px;padding:6px 12px" onclick="openEditModal('+i+')">編集</button>';
    html += '<button class="btn btn-danger" style="font-size:12px;padding:6px 12px" onclick="deleteQuestion('+i+')">削除</button>';
    html += '</div></div>';
  });
  el.innerHTML = html;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openAddModal() {
  editIndex = -1;
  document.getElementById('modalTitle').textContent = '問題を追加';
  document.getElementById('fQuestion').value = '';
  document.getElementById('choicesContainer').innerHTML = '';
  addChoiceRow(); addChoiceRow(); addChoiceRow();
  document.getElementById('modalBg').classList.add('show');
}

function openEditModal(idx) {
  editIndex = idx;
  var qs = getQuestions(currentLevel);
  var q = qs[idx];
  document.getElementById('modalTitle').textContent = '問題を編集（Q'+(idx+1)+'）';
  document.getElementById('fQuestion').value = q.q;
  document.getElementById('choicesContainer').innerHTML = '';
  q.choices.forEach(function(c){ addChoiceRow(c.t, c.c); });
  document.getElementById('modalBg').classList.add('show');
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('show');
}

function addChoiceRow(text, isCorrect) {
  var container = document.getElementById('choicesContainer');
  var row = document.createElement('div');
  row.className = 'choiceRow';
  var cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.title = '正解';
  if (isCorrect) cb.checked = true;
  var inp = document.createElement('input');
  inp.type = 'text';
  inp.placeholder = '選択肢テキスト';
  inp.value = text || '';
  var rmBtn = document.createElement('button');
  rmBtn.className = 'removeChoiceBtn';
  rmBtn.textContent = '削除';
  rmBtn.onclick = function(){ container.removeChild(row); };
  row.appendChild(cb);
  row.appendChild(inp);
  row.appendChild(rmBtn);
  container.appendChild(row);
}

function saveQuestion() {
  var qText = document.getElementById('fQuestion').value.trim();
  if (!qText) { alert('問題文を入力してください'); return; }
  var rows = document.querySelectorAll('#choicesContainer .choiceRow');
  if (rows.length < 2) { alert('選択肢を2つ以上入力してください'); return; }
  var choices = [];
  var hasCorrect = false;
  var valid = true;
  rows.forEach(function(row){
    var cb = row.querySelector('input[type=checkbox]');
    var inp = row.querySelector('input[type=text]');
    var t = inp.value.trim();
    if (!t) { valid = false; return; }
    if (cb.checked) hasCorrect = true;
    choices.push({ t: t, c: cb.checked });
  });
  if (!valid) { alert('空の選択肢があります'); return; }
  if (!hasCorrect) { alert('正解を1つ以上チェックしてください'); return; }

  var qs = getQuestions(currentLevel);
  var newQ = { q: qText, choices: choices };
  if (editIndex >= 0) {
    qs[editIndex] = newQ;
  } else {
    qs.push(newQ);
  }
  saveQuestions(currentLevel, qs);
  closeModal();
  renderList();
}

function deleteQuestion(idx) {
  if (!confirm('Q'+(idx+1)+'を削除しますか？')) return;
  var qs = getQuestions(currentLevel);
  qs.splice(idx, 1);
  saveQuestions(currentLevel, qs);
  renderList();
}

function resetToDefault() {
  if (!confirm(currentLevel + 'の問題をデフォルトに戻しますか？\n（追加・編集した問題は全て失われます）')) return;
  localStorage.removeItem('bouhan_q_' + currentLevel);
  renderList();
}

// ===== Export =====
function exportQuestions() {
  var qs = getQuestions(currentLevel);
  var json = JSON.stringify(qs, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'bouhan_' + currentLevel + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ===== Import =====
function importQuestions(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) { alert('JSONの形式が正しくありません'); return; }
      // validate basic structure
      var ok = data.every(function(q){ return q.q && Array.isArray(q.choices); });
      if (!ok) { alert('問題データの構造が正しくありません'); return; }
      if (!confirm(currentLevel + 'の問題をインポートしたデータ（' + data.length + '問）で上書きしますか？')) return;
      saveQuestions(currentLevel, data);
      renderList();
      alert('インポート完了しました（' + data.length + '問）');
    } catch(err) {
      alert('JSONの読み込みに失敗しました: ' + err.message);
    }
    // reset file input so same file can be re-imported
    event.target.value = '';
  };
  reader.readAsText(file);
}

// init
renderList();
</script>
</body>
</html>
